services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: climate
      POSTGRES_PASSWORD: climate
      POSTGRES_DB: climate_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U climate -d climate_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
